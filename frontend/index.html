<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLTMS — Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🚛</div>
      <h1>Impano Gateway Logistics</h1>
      <p>Smart Logistics & Transportation Management System</p>
    </div>

    <div id="alert-box"></div>

    <form id="login-form">
      <div class="form-group" style="margin-bottom:16px;">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="admin@impano.rw" required>
      </div>
      <div class="form-group" style="margin-bottom:24px;">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; padding:12px; font-size:15px;">
        🔐 Login to System
      </button>
    </form>

    <div style="margin-top:20px; padding:14px; background:#f0f4ff; border-radius:8px; font-size:12px; color:#667788;">
      <strong>Demo Credentials:</strong><br>
      Admin: admin@impano.rw / admin123<br>
      Manager: manager@impano.rw / manager123
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if (login(email, password)) {
      saveSession(currentUser);
      window.location.href = 'pages/dashboard.html';
    } else {
      showAlert('alert-box', 'Invalid email or password. Please try again.', 'danger');
    }
  });
</script>
</body>
</html>
