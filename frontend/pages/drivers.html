<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLTMS — Drivers</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>requireAuth(); renderSidebar();</script>

<div class="main">
  <div class="topbar">
    <h1>🚗 Driver Management</h1>
    <button class="btn btn-primary" onclick="openModal('modal-add-driver')">+ Add Driver</button>
  </div>
  <div class="content">
    <div id="alert-box"></div>
    <div class="card">
      <div class="card-header"><h2>All Drivers</h2></div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>License</th><th>Availability</th></tr></thead>
            <tbody id="drivers-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-add-driver">
  <div class="modal">
    <div class="modal-header">
      <h3>🚗 Register New Driver</h3>
      <button class="modal-close" onclick="closeModal('modal-add-driver')">✕</button>
    </div>
    <form id="driver-form">
      <div class="form-grid">
        <div class="form-group"><label>Full Name</label><input type="text" id="d-name" required placeholder="Driver full name"></div>
        <div class="form-group"><label>Email</label><input type="email" id="d-email" required placeholder="driver@impano.rw"></div>
        <div class="form-group"><label>License Number</label><input type="text" id="d-license" required placeholder="RW-DL-000"></div>
        <div class="form-group"><label>Password</label><input type="password" id="d-password" required placeholder="Set password"></div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">✔ Register Driver</button>
        <button type="button" class="btn btn-outline" onclick="closeModal('modal-add-driver')">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function renderTable() {
    const tbody = document.getElementById('drivers-table');
    tbody.innerHTML = '';
    DB.drivers.forEach(d => {
      tbody.innerHTML += `<tr>
        <td><code>${d.id}</code></td>
        <td><strong>${d.name}</strong></td>
        <td>${d.email}</td>
        <td>${d.license}</td>
        <td><span class="badge ${d.available ? 'badge-delivered' : 'badge-transit'}">${d.available ? 'AVAILABLE' : 'ON TRIP'}</span></td>
      </tr>`;
    });
  }

  document.getElementById('driver-form').addEventListener('submit', function(e) {
    e.preventDefault();
    DB.drivers.push({
      id: generateId('DRV'),
      name: document.getElementById('d-name').value,
      email: document.getElementById('d-email').value,
      license: document.getElementById('d-license').value,
      available: true
    });
    closeModal('modal-add-driver');
    showAlert('alert-box', 'Driver registered successfully!', 'success');
    this.reset();
    renderTable();
  });

  renderTable();
</script>
</body>
</html>
