<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLTMS — Reports</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>requireAuth(); renderSidebar();</script>

<div class="main">
  <div class="topbar"><h1>📈 Reports & Analytics</h1></div>
  <div class="content">

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon blue">👤</div><div class="stat-info"><h3 id="r-clients">0</h3><p>Total Clients</p></div></div>
      <div class="stat-card"><div class="stat-icon green">🚗</div><div class="stat-info"><h3 id="r-drivers">0</h3><p>Total Drivers</p></div></div>
      <div class="stat-card"><div class="stat-icon orange">🚛</div><div class="stat-info"><h3 id="r-vehicles">0</h3><p>Total Vehicles</p></div></div>
      <div class="stat-card"><div class="stat-icon red">📦</div><div class="stat-info"><h3 id="r-shipments">0</h3><p>Total Shipments</p></div></div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px;">

      <!-- Shipment Status Breakdown -->
      <div class="card">
        <div class="card-header"><h2>📦 Shipment Status Breakdown</h2></div>
        <div class="card-body">
          <table>
            <thead><tr><th>Status</th><th>Count</th><th>%</th></tr></thead>
            <tbody id="status-breakdown"></tbody>
          </table>
        </div>
      </div>

      <!-- Revenue Summary -->
      <div class="card">
        <div class="card-header"><h2>💰 Revenue Summary</h2></div>
        <div class="card-body">
          <table>
            <thead><tr><th>Category</th><th>Amount (RWF)</th></tr></thead>
            <tbody id="revenue-summary"></tbody>
          </table>
        </div>
      </div>

      <!-- Fleet Status -->
      <div class="card">
        <div class="card-header"><h2>🚛 Fleet Status</h2></div>
        <div class="card-body">
          <table>
            <thead><tr><th>Vehicle</th><th>Type</th><th>Status</th></tr></thead>
            <tbody id="fleet-status"></tbody>
          </table>
        </div>
      </div>

      <!-- Driver Status -->
      <div class="card">
        <div class="card-header"><h2>🚗 Driver Availability</h2></div>
        <div class="card-body">
          <table>
            <thead><tr><th>Driver</th><th>License</th><th>Status</th></tr></thead>
            <tbody id="driver-status"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  // Stats
  document.getElementById('r-clients').textContent   = DB.clients.length;
  document.getElementById('r-drivers').textContent   = DB.drivers.length;
  document.getElementById('r-vehicles').textContent  = DB.vehicles.length;
  document.getElementById('r-shipments').textContent = DB.shipments.length;

  // Shipment status breakdown
  const statuses = ['PENDING','ASSIGNED','IN_TRANSIT','DELIVERED','CANCELLED'];
  const total = DB.shipments.length || 1;
  const sb = document.getElementById('status-breakdown');
  statuses.forEach(st => {
    const count = DB.shipments.filter(s => s.status === st).length;
    const pct   = Math.round((count / total) * 100);
    sb.innerHTML += `<tr><td>${statusBadge(st)}</td><td>${count}</td><td>${pct}%</td></tr>`;
  });

  // Revenue
  const totalRevenue  = DB.invoices.reduce((s, i) => s + i.amount, 0);
  const paidRevenue   = DB.invoices.filter(i => i.paid).reduce((s, i) => s + i.amount, 0);
  const unpaidRevenue = totalRevenue - paidRevenue;
  const rs = document.getElementById('revenue-summary');
  rs.innerHTML = `
    <tr><td>Total Invoiced</td><td><strong>${formatRWF(totalRevenue)}</strong></td></tr>
    <tr><td>Collected (Paid)</td><td style="color:#065f46;"><strong>${formatRWF(paidRevenue)}</strong></td></tr>
    <tr><td>Outstanding (Unpaid)</td><td style="color:#9b1c1c;"><strong>${formatRWF(unpaidRevenue)}</strong></td></tr>
  `;

  // Fleet
  const fs = document.getElementById('fleet-status');
  DB.vehicles.forEach(v => {
    const sc = v.status === 'AVAILABLE' ? 'badge-delivered' : 'badge-transit';
    fs.innerHTML += `<tr><td>${v.plate}</td><td>${v.type}</td><td><span class="badge ${sc}">${v.status.replace('_',' ')}</span></td></tr>`;
  });

  // Drivers
  const ds = document.getElementById('driver-status');
  DB.drivers.forEach(d => {
    ds.innerHTML += `<tr><td>${d.name}</td><td>${d.license}</td><td><span class="badge ${d.available ? 'badge-delivered' : 'badge-transit'}">${d.available ? 'AVAILABLE' : 'ON TRIP'}</span></td></tr>`;
  });
</script>
</body>
</html>
