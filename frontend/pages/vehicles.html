<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLTMS — Vehicles</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>requireAuth(); renderSidebar();</script>

<div class="main">
  <div class="topbar">
    <h1>🚛 Fleet Management</h1>
    <button class="btn btn-primary" onclick="openModal('modal-add-vehicle')">+ Add Vehicle</button>
  </div>
  <div class="content">
    <div id="alert-box"></div>
    <div class="card">
      <div class="card-header"><h2>Fleet Vehicles</h2></div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Plate Number</th><th>Type</th><th>Capacity (kg)</th><th>Status</th></tr></thead>
            <tbody id="vehicles-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-add-vehicle">
  <div class="modal">
    <div class="modal-header">
      <h3>🚛 Add Vehicle to Fleet</h3>
      <button class="modal-close" onclick="closeModal('modal-add-vehicle')">✕</button>
    </div>
    <form id="vehicle-form">
      <div class="form-grid">
        <div class="form-group"><label>Plate Number</label><input type="text" id="v-plate" required placeholder="e.g. RAC 001A"></div>
        <div class="form-group">
          <label>Vehicle Type</label>
          <select id="v-type" required>
            <option value="TRUCK">TRUCK</option>
            <option value="VAN">VAN</option>
            <option value="MOTORCYCLE">MOTORCYCLE</option>
            <option value="PICKUP">PICKUP</option>
          </select>
        </div>
        <div class="form-group"><label>Capacity (kg)</label><input type="number" id="v-capacity" required placeholder="e.g. 5000" min="1"></div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">✔ Add Vehicle</button>
        <button type="button" class="btn btn-outline" onclick="closeModal('modal-add-vehicle')">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function renderTable() {
    const tbody = document.getElementById('vehicles-table');
    tbody.innerHTML = '';
    DB.vehicles.forEach(v => {
      const statusClass = v.status === 'AVAILABLE' ? 'badge-delivered' : v.status === 'ON_TRIP' ? 'badge-transit' : 'badge-cancelled';
      tbody.innerHTML += `<tr>
        <td><code>${v.id}</code></td>
        <td><strong>${v.plate}</strong></td>
        <td>${v.type}</td>
        <td>${v.capacity.toLocaleString()} kg</td>
        <td><span class="badge ${statusClass}">${v.status.replace('_',' ')}</span></td>
      </tr>`;
    });
  }

  document.getElementById('vehicle-form').addEventListener('submit', function(e) {
    e.preventDefault();
    DB.vehicles.push({
      id: generateId('VEH'),
      plate: document.getElementById('v-plate').value,
      type: document.getElementById('v-type').value,
      capacity: parseFloat(document.getElementById('v-capacity').value),
      status: 'AVAILABLE'
    });
    closeModal('modal-add-vehicle');
    showAlert('alert-box', 'Vehicle added to fleet!', 'success');
    this.reset();
    renderTable();
  });

  renderTable();
</script>
</body>
</html>
